# Baseline  —  InceptionResnetV1 + Siamese + CosinePairLoss
# Train: CASIA-WebFace random pairs
# Val  : CALFW + CPLFW eval pairs
# Test : LFW only (evaluate_lfw.py)

# --- Model identity ---
variant: i
backbone_type: inception
loss_type: contrastive
checkpoint_name: baseline
input_size: 160

# --- Data ---
processed_data_dir: data/processed
max_train_identities: 5000
max_images_per_identity: 30
webface_pairs_per_epoch: 10000
split_seed: 42

# --- Training loop ---
epochs: 30
batch_size: 64
early_stopping_patience: 8

# --- Optimizer ---
learning_rate: 5.0e-5       # Lower LR — pretrained model needs fine steps
weight_decay: 5.0e-4

# --- Backbone ---
dropout: 0.1
unfreeze_ratio: 0.3

# --- Cosine pair loss ---
# Pretrained VGGFace2 already satisfies pos>0.5 and neg<0.3 easily.
# Raise the bar so the loss doesn't collapse immediately:
#   pos_threshold=0.8 → want same-person similarity > 0.8 (was > 0.5)
#   neg_threshold=0.5 → want diff-person similarity < 0.5 (was < 0.3)
cosine_pos_threshold: 0.8
cosine_neg_threshold: 0.5

# --- Evaluation ---
lfw_test_augmentation: true

# --- DataLoader ---
num_workers: 8
prefetch_factor: 2
