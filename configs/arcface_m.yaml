# Train: CASIA-WebFace | Val: CALFW+CPLFW | Test: LFW
variant: m
loss_type: arcface
checkpoint_name: arcface_m
input_size: 384
batch_size: 8
learning_rate: 1.0e-4
backbone_lr: 5.0e-6
arcface_lr: 1.0e-4
weight_decay: 5.0e-4
verification_weight: 0.2
webface_pairs_per_epoch: 10000
freeze_batchnorm: true
epochs: 30
dropout: 0.1
unfreeze_ratio: 0.05
early_stopping_patience: 8
arcface_scale: 64.0
arcface_margin: 0.5
contrastive_margin: 1.0
p_identities: 8
k_images: 4
hard_mining_weight: 0.05
mining_strategy: hard
min_images: 2
split_seed: 42
processed_data_dir: data/processed
lfw_test_augmentation: true
num_workers: 8
prefetch_factor: 2
max_train_identities: 2000
max_images_per_identity: 20
