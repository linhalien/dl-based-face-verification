# ─────────────────────────────────────────────────────────────
# Baseline M  —  Siamese + Contrastive Loss  (EfficientNetV2-M)
# Train: CASIA-WebFace random pairs
# Val  : CALFW + CPLFW eval pairs
# Test : LFW only (evaluate_lfw.py)
# ─────────────────────────────────────────────────────────────

# --- Model identity ---
variant: m                    # EfficientNetV2-Medium: input 384px, more capacity than S
loss_type: contrastive
checkpoint_name: baseline_m
input_size: 384               # Must match variant m

# --- Data ---
processed_data_dir: data/processed
max_train_identities: 2000
max_images_per_identity: 20
webface_pairs_per_epoch: 10000
split_seed: 42

# --- Training loop ---
epochs: 30
batch_size: 8                 # Halved vs S because 384px images use more GPU memory
early_stopping_patience: 5

# --- Optimizer ---
learning_rate: 1.0e-4
weight_decay: 5.0e-4

# --- Backbone ---
embedding_dim: 512
dropout: 0.3
unfreeze_ratio: 0.3

# --- Cosine pair loss ---
cosine_pos_threshold: 0.5
cosine_neg_threshold: 0.3

# --- Evaluation ---
lfw_test_augmentation: true

# --- DataLoader speed ---
num_workers: 8
prefetch_factor: 2
