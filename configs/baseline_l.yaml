# ─────────────────────────────────────────────────────────────
# Baseline L  —  Siamese + Contrastive Loss  (EfficientNetV2-L)
# Train: CASIA-WebFace random pairs
# Val  : CALFW + CPLFW eval pairs
# Test : LFW only (evaluate_lfw.py)
# ─────────────────────────────────────────────────────────────

# --- Model identity ---
variant: l                    # EfficientNetV2-Large: input 480px, highest capacity
loss_type: contrastive
checkpoint_name: baseline_l
input_size: 480               # Must match variant l

# --- Data ---
processed_data_dir: data/processed
max_train_identities: 2000
max_images_per_identity: 20
webface_pairs_per_epoch: 10000
split_seed: 42

# --- Training loop ---
epochs: 30
batch_size: 4                 # Quartered vs S because 480px images are much larger in memory
early_stopping_patience: 5

# --- Optimizer ---
learning_rate: 1.0e-4
weight_decay: 5.0e-4

# --- Backbone ---
embedding_dim: 512
dropout: 0.3
unfreeze_ratio: 0.3

# --- Cosine pair loss ---
cosine_pos_threshold: 0.5
cosine_neg_threshold: 0.3

# --- Evaluation ---
lfw_test_augmentation: true

# --- DataLoader speed ---
num_workers: 8
prefetch_factor: 2
